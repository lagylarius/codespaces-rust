<!DOCTYPE html>
<html>
<head>
    <title>WASM Test</title>

    <style>
        html, body {
            margin: 0;
            height: 100%;
            overflow: hidden;
        }

        #app {
            width: 100%;
            height: 100%;
        }
      canvas {
        position: absolute;
        image-rendering: pixelated;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: block;
        z-index: 0;
      }
    </style>
</head>

<body>
    <div id="app"></div>

    <canvas id="canvas"></canvas>

    <script type="module">
        const canvas = document.getElementById('canvas');
        canvas.width = canvas.clientWidth;
        canvas.height = canvas.clientHeight;

        const observer = new ResizeObserver(() => {
            canvas.width = canvas.clientWidth;
            canvas.height = canvas.clientHeight;
        });
        observer.observe(canvas);

        import init from "./pkg/tcore.js";

        async function run() {
            await init();
        }

        run();
    </script>
</body>
</html>
